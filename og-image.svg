<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="0%" r="90%" fx="50%" fy="0%">
      <stop offset="0%"   stop-color="#26120c"/>
      <stop offset="52%"  stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1f232c"/>
      <stop offset="100%" stop-color="#181b22"/>
    </linearGradient>
  </defs>

  <!-- 전체 배경 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 상단 accent 바 -->
  <rect x="0" y="0" width="1200" height="7" fill="#ff6b35"/>

  <!-- 메인 카드 패널 -->
  <rect x="48" y="50" width="1104" height="530" rx="22"
        fill="url(#cardGrad)" stroke="#2a2f3a" stroke-width="1.5"/>

  <!-- 브랜드 라벨 -->
  <rect x="88" y="100" width="20" height="20" rx="5" fill="#ff6b35"/>
  <text x="118" y="118"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="25" fill="#ffb347" letter-spacing="1">밀비교</text>
  <text x="192" y="116"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="21" fill="#9aa3b2">밀키트 · 식자재 비교</text>

  <!-- 헤드라인 1줄: "이 메뉴," -->
  <text x="88" y="213"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="900" font-size="76" fill="#eef1f6" letter-spacing="-2">이 메뉴,</text>

  <!-- 헤드라인 2줄: "어디가 제일 나을까?" -->
  <text x="88" y="305"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="900" font-size="76" fill="#ff6b35" letter-spacing="-2">어디가 제일 나을까?</text>

  <!-- 서브카피 -->
  <text x="88" y="360"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="27" fill="#9aa3b2">인기 밀키트 · 식자재 22곳을 4가지 기준으로 한 화면 비교</text>

  <!-- 구분선 -->
  <line x1="88" y1="390" x2="1112" y2="390" stroke="#2a2f3a" stroke-width="1.5"/>

  <!--
    4축 카드 레이아웃
    사용 가능 너비: x=88 ~ x=1112 = 1024px
    간격 3개 × 14px = 42px → 카드 너비 = (1024-42)/4 = 245px
    x 시작점: 88 / 347 / 606 / 865
    카드 높이: 96px   y=404 ~ y=500
    내부 텍스트 y 기준선: 레이블=438, 바=455, 서브=477
  -->

  <!-- ── 가격 카드 (민트) ── -->
  <rect x="88" y="404" width="245" height="96" rx="13"
        fill="#0c2218" stroke="#37d399" stroke-width="1.5"/>
  <rect x="88" y="404" width="5"   height="96" rx="2" fill="#37d399"/>
  <circle cx="118" cy="437" r="8" fill="#37d399"/>
  <text x="136" y="443"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="17" fill="#eef1f6">가격</text>
  <text x="136" y="461"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="13" fill="#9aa3b2">1인분 최저가 직접 비교</text>
  <!-- 점수 바 -->
  <rect x="108" y="473" width="205" height="7" rx="3" fill="#1a3028"/>
  <rect x="108" y="473" width="185" height="7" rx="3" fill="#37d399"/>

  <!-- ── 맛 카드 (옐로우) ── -->
  <rect x="347" y="404" width="245" height="96" rx="13"
        fill="#231d00" stroke="#ffd166" stroke-width="1.5"/>
  <rect x="347" y="404" width="5"   height="96" rx="2" fill="#ffd166"/>
  <circle cx="377" cy="437" r="8" fill="#ffd166"/>
  <text x="395" y="443"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="17" fill="#eef1f6">맛</text>
  <text x="395" y="461"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="13" fill="#9aa3b2">실제 후기 맛 점수</text>
  <rect x="367" y="473" width="205" height="7" rx="3" fill="#2e2800"/>
  <rect x="367" y="473" width="175" height="7" rx="3" fill="#ffd166"/>

  <!-- ── 후기 카드 (블루) ── -->
  <rect x="606" y="404" width="245" height="96" rx="13"
        fill="#0b1626" stroke="#54a0ff" stroke-width="1.5"/>
  <rect x="606" y="404" width="5"   height="96" rx="2" fill="#54a0ff"/>
  <circle cx="636" cy="437" r="8" fill="#54a0ff"/>
  <text x="654" y="443"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="17" fill="#eef1f6">후기</text>
  <text x="654" y="461"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="13" fill="#9aa3b2">후기 수 · 신뢰도 종합</text>
  <rect x="626" y="473" width="205" height="7" rx="3" fill="#101e35"/>
  <rect x="626" y="473" width="192" height="7" rx="3" fill="#54a0ff"/>

  <!-- ── 재구매 카드 (로즈 / 보조 지표) ── -->
  <rect x="865" y="404" width="245" height="96" rx="13"
        fill="rgba(196,92,153,0.07)" stroke="rgba(196,92,153,0.32)" stroke-width="1.5"/>
  <rect x="865" y="404" width="5"   height="96" rx="2" fill="#c45c99" opacity="0.65"/>
  <circle cx="895" cy="437" r="8" fill="#c45c99" opacity="0.65"/>
  <text x="913" y="443"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="17" fill="#eef1f6" opacity="0.85">재구매</text>
  <!-- 참고 지표 뱃지 -->
  <rect x="977" y="424" width="72" height="19" rx="9"
        fill="rgba(196,92,153,0.16)" stroke="rgba(196,92,153,0.28)" stroke-width="1"/>
  <text x="1013" y="437"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="11" fill="#c45c99" text-anchor="middle">참고 지표</text>
  <text x="913" y="461"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="13" fill="#9aa3b2" opacity="0.8">재구매 언급 빈도 추정</text>
  <rect x="885" y="473" width="205" height="7" rx="3" fill="rgba(196,92,153,0.08)"/>
  <rect x="885" y="473" width="155" height="7" rx="3" fill="#c45c99" opacity="0.5"/>

  <!-- 하단 브랜드/URL -->
  <rect x="88" y="518" width="20" height="20" rx="5" fill="#ff6b35"/>
  <text x="118" y="535"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="700" font-size="24" fill="#ff6b35" letter-spacing="0.5">밀비교</text>
  <text x="196" y="533"
        font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif"
        font-weight="400" font-size="22" fill="#9aa3b2">· mealkit-milbigyo.netlify.app</text>
</svg>
